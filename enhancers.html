<style>
/* ---- Bind the kit's serif + a clean UI sans, then layer minimal components on
       top of the vk- tokens. Everything below reads the kit's variables so one
       --vk-mint change reskins the whole page. ---- */
:root{ --vk-font-serif:'Instrument Serif'; --en-mono:'JetBrains Mono',ui-monospace,monospace; }
*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{ background:var(--vk-bg); color:var(--vk-fg); font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; -webkit-font-smoothing:antialiased; }

.en-shell{ max-width:720px; gap:var(--vk-space-6); }
.en-header{ flex-direction:row; align-items:flex-end; justify-content:space-between; gap:var(--vk-space-4); flex-wrap:wrap; }
.en-header .vk-date{ margin-top:6px; }
.en-back{ font-family:var(--en-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--vk-mint); text-decoration:none; border:1px solid var(--vk-border-strong); border-radius:var(--vk-radius-pill); padding:8px 15px; transition:background var(--vk-duration) var(--vk-ease), border-color var(--vk-duration) var(--vk-ease); white-space:nowrap; }
.en-back:hover{ background:rgba(110,231,183,.08); border-color:rgba(110,231,183,.4); }

/* segmented tabs */
.en-tabs{ display:inline-flex; gap:4px; padding:4px; border:1px solid var(--vk-border); border-radius:var(--vk-radius-pill); background:var(--vk-card); align-self:flex-start; opacity:0; animation:vk-fade-up 700ms var(--vk-ease-premium) .1s forwards; }
.en-tab{ appearance:none; background:transparent; border:0; cursor:pointer; color:var(--vk-muted); font-family:var(--en-mono); font-size:11.5px; letter-spacing:.12em; text-transform:uppercase; padding:9px 16px; border-radius:var(--vk-radius-pill); transition:color var(--vk-duration) var(--vk-ease), background var(--vk-duration) var(--vk-ease); }
.en-tab:hover{ color:var(--vk-muted-strong); }
.en-tab.on{ background:var(--vk-mint); color:#04130c; font-weight:600; }

#panel{ display:flex; flex-direction:column; }

/* cards + shared primitives */
.en-card{ border:1px solid var(--vk-border); border-radius:18px; background:var(--vk-card); padding:20px; margin-bottom:14px; opacity:0; transform:translateY(10px); animation:vk-tile-in 600ms var(--vk-ease-premium) forwards; }
.en-card:nth-child(1){ animation-delay:60ms; } .en-card:nth-child(2){ animation-delay:130ms; }
.en-card:nth-child(3){ animation-delay:200ms; } .en-card:nth-child(4){ animation-delay:270ms; } .en-card:nth-child(5){ animation-delay:340ms; }
.en-eyebrow{ font-family:var(--en-mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--vk-mint); margin:0 0 14px; display:flex; align-items:center; gap:8px; }
.en-eyebrow::before{ content:''; width:20px; height:1px; background:linear-gradient(90deg,var(--vk-mint),transparent); }

.en-hero{ display:flex; align-items:baseline; justify-content:space-between; gap:14px; flex-wrap:wrap; }
.en-heroNum{ font-family:var(--vk-font-serif),Georgia,serif; font-style:italic; font-size:46px; line-height:1; font-variant-numeric:tabular-nums; }
.en-heroNum small{ font-family:'Inter',sans-serif; font-style:normal; font-size:14px; color:var(--vk-muted); margin-left:6px; }
.en-chipStat{ display:inline-flex; align-items:center; gap:8px; font-family:var(--en-mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; padding:8px 13px; border-radius:var(--vk-radius-pill); border:1px solid var(--vk-border-strong); background:rgba(110,231,183,.08); color:var(--vk-mint); }
.en-chipStat .dot{ width:7px; height:7px; border-radius:50%; background:currentColor; box-shadow:0 0 9px currentColor; }
.en-chipStat[data-tone="warn"]{ color:var(--vk-amber); border-color:rgba(245,158,11,.4); background:rgba(245,158,11,.1); }
.en-chipStat[data-tone="danger"]{ color:var(--vk-red); border-color:rgba(239,68,68,.45); background:rgba(239,68,68,.12); }
.en-chipStat[data-tone="muted"]{ color:var(--vk-muted-strong); border-color:var(--vk-border); background:var(--vk-card); }

.en-insights{ display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
.en-insight{ flex:1; min-width:110px; background:var(--vk-card-elevated); border:1px solid var(--vk-border); border-radius:13px; padding:11px 13px; }
.en-insLabel{ font-family:var(--en-mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--vk-muted); }
.en-insVal{ font-family:var(--vk-font-serif),serif; font-style:italic; font-size:20px; margin-top:3px; font-variant-numeric:tabular-nums; }
.en-insSub{ font-size:11px; color:var(--vk-muted-strong); margin-top:1px; }
.en-mint{ color:var(--vk-mint); } .en-amber{ color:var(--vk-amber); }

.en-note{ margin-top:16px; font-size:13px; line-height:1.5; padding:12px 14px; border-radius:12px; border-left:3px solid var(--vk-border-strong); background:rgba(110,231,183,.06); color:var(--vk-muted-strong); }
.en-note.warn{ border-color:var(--vk-amber); background:rgba(245,158,11,.08); }
.en-note.danger{ border-color:var(--vk-red); background:rgba(239,68,68,.1); color:#ffd9de; }
.en-note b{ color:var(--vk-fg); font-weight:600; }

/* chart */
.en-chartWrap{ margin-top:18px; }
.en-chart{ width:100%; height:118px; display:block; overflow:visible; }
.en-axis{ display:flex; justify-content:space-between; font-family:var(--en-mono); font-size:9px; color:var(--vk-muted); margin-top:6px; letter-spacing:.06em; }

/* daily bar */
.en-barHead{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:10px; }
.en-barNum{ font-family:var(--vk-font-serif),serif; font-style:italic; font-size:22px; font-variant-numeric:tabular-nums; }
.en-barTarget{ color:var(--vk-muted); font-size:13px; }
.en-bar{ height:9px; border-radius:var(--vk-radius-pill); background:rgba(255,255,255,.06); overflow:hidden; }
.en-barFill{ height:100%; border-radius:var(--vk-radius-pill); background:linear-gradient(90deg,var(--vk-mint-deep),var(--vk-mint)); box-shadow:0 0 12px var(--vk-mint-glow); transition:width .5s var(--vk-ease-premium); }
.en-barFill.over{ background:linear-gradient(90deg,var(--vk-amber),var(--vk-red)); box-shadow:0 0 12px rgba(239,68,68,.5); }

/* inputs / chips / buttons */
.en-search{ position:relative; margin-bottom:12px; }
.en-search .ic{ position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--vk-muted); display:flex; pointer-events:none; }
.en-input{ width:100%; appearance:none; background:rgba(255,255,255,.04); border:1px solid var(--vk-border-strong); border-radius:13px; color:var(--vk-fg); font-family:inherit; font-size:15px; padding:12px 14px; outline:none; transition:border-color var(--vk-duration) var(--vk-ease); }
.en-input.pad{ padding-left:38px; }
.en-input:focus{ border-color:var(--vk-mint); box-shadow:0 0 0 3px rgba(110,231,183,.1); }
.en-row2{ display:flex; gap:8px; flex-wrap:wrap; }
.en-row2 .en-input{ flex:1; min-width:120px; }
.en-row2 .mg{ flex:0 0 96px; min-width:0; }
.en-time{ background:rgba(255,255,255,.04); border:1px solid var(--vk-border); border-radius:10px; padding:9px 12px; color:var(--vk-fg); font-family:inherit; font-size:14px; }
.en-time:focus{ outline:none; border-color:var(--vk-mint); }

.en-btn{ appearance:none; cursor:pointer; border:0; border-radius:13px; padding:0 18px; font-family:var(--en-mono); font-size:12px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#04130c; background:var(--vk-mint); transition:filter var(--vk-duration) var(--vk-ease); }
.en-btn:hover{ filter:brightness(1.08); }
.en-btn.block{ width:100%; padding:15px; font-size:13px; }
.en-ghost{ appearance:none; cursor:pointer; background:rgba(110,231,183,.06); border:1px solid var(--vk-border-strong); border-radius:var(--vk-radius-pill); color:var(--vk-mint); font-family:var(--en-mono); font-size:11px; letter-spacing:.06em; padding:8px 14px; transition:background var(--vk-duration) var(--vk-ease); }
.en-ghost:hover{ background:rgba(110,231,183,.13); }
.en-ghost.on{ background:var(--vk-mint); color:#04130c; border-color:transparent; font-weight:600; }

.en-chips{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.en-chip{ appearance:none; cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; color:var(--vk-mint); background:rgba(110,231,183,.06); border:1px solid var(--vk-border-strong); border-radius:var(--vk-radius-pill); padding:8px 14px; transition:background var(--vk-duration) var(--vk-ease), border-color var(--vk-duration) var(--vk-ease); }
.en-chip:hover{ background:rgba(110,231,183,.14); border-color:var(--vk-mint); }

.en-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:7px; max-height:360px; overflow-y:auto; }
.en-itemRow{ display:flex; align-items:center; gap:12px; padding:11px 13px; background:var(--vk-card-elevated); border:1px solid var(--vk-border); border-radius:12px; cursor:pointer; transition:border-color var(--vk-duration) var(--vk-ease), background var(--vk-duration) var(--vk-ease); }
.en-itemRow:hover{ border-color:rgba(110,231,183,.35); background:rgba(110,231,183,.05); }
.en-itemMain{ flex:1; min-width:0; }
.en-itemName{ font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.en-itemMeta{ font-family:var(--en-mono); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--vk-muted); margin-top:2px; }
.en-itemVal{ font-family:var(--en-mono); font-weight:600; color:var(--vk-mint); white-space:nowrap; }
.en-itemVal small{ color:var(--vk-muted); font-weight:400; }
.en-muted{ font-size:13px; color:var(--vk-muted); padding:8px 2px; line-height:1.5; }
.en-del{ appearance:none; background:transparent; border:1px solid var(--vk-border); color:var(--vk-muted); width:28px; height:28px; border-radius:8px; cursor:pointer; flex-shrink:0; font-size:15px; line-height:1; }
.en-del:hover{ color:var(--vk-red); border-color:var(--vk-red); }

/* supplement stack */
.en-stack{ display:flex; flex-direction:column; gap:8px; }
.en-stackRow{ display:flex; align-items:center; gap:12px; padding:12px 13px; border:1px solid var(--vk-border); border-radius:12px; background:var(--vk-card-elevated); }
.en-stackRow.taken{ border-color:rgba(110,231,183,.3); background:rgba(110,231,183,.06); }
.en-check{ appearance:none; cursor:pointer; flex-shrink:0; width:26px; height:26px; border-radius:50%; border:1.5px solid var(--vk-border-strong); background:transparent; color:#04130c; display:grid; place-items:center; font-size:14px; transition:all var(--vk-duration) var(--vk-ease); }
.en-stackRow.taken .en-check{ background:var(--vk-mint); border-color:transparent; }
.en-stackName{ flex:1; min-width:0; }
.en-stackName b{ font-weight:600; font-size:14px; }
.en-stackName span{ display:block; font-family:var(--en-mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--vk-muted); margin-top:2px; }

/* recommendations */
.en-rec{ border:1px solid var(--vk-border); border-radius:12px; background:var(--vk-card-elevated); padding:13px 14px; margin-bottom:8px; }
.en-rec.dim{ opacity:.5; }
.en-recTop{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
.en-recName{ font-weight:600; font-size:14px; }
.en-recName small{ font-family:var(--en-mono); font-weight:400; color:var(--vk-muted); font-size:11px; margin-left:6px; }
.en-recPrice{ font-family:var(--en-mono); font-size:12px; color:var(--vk-mint); white-space:nowrap; }
.en-recHelp{ font-size:12.5px; color:var(--vk-muted-strong); line-height:1.5; margin-top:6px; }
.en-recWhy{ display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.en-tag{ font-family:var(--en-mono); font-size:9px; letter-spacing:.06em; text-transform:uppercase; color:var(--vk-mint); background:rgba(110,231,183,.08); border:1px solid var(--vk-border); border-radius:var(--vk-radius-pill); padding:3px 9px; }
.en-recActions{ display:flex; gap:8px; margin-top:11px; align-items:center; }
.en-recAdd{ appearance:none; cursor:pointer; border:0; border-radius:9px; padding:7px 14px; font-family:var(--en-mono); font-size:11px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:#04130c; background:var(--vk-mint); }
.en-recAdd:hover{ filter:brightness(1.08); }
.en-recBuy{ font-family:var(--en-mono); font-size:11px; color:var(--vk-muted-strong); text-decoration:none; border-bottom:1px solid var(--vk-border-strong); }
.en-recBuy:hover{ color:var(--vk-mint); }
.en-budget{ display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.en-budget label{ font-family:var(--en-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--vk-muted); }
.en-budget input{ width:90px; background:rgba(255,255,255,.04); border:1px solid var(--vk-border); border-radius:10px; padding:9px 12px; color:var(--vk-fg); font-family:inherit; font-size:14px; }
.en-budget input:focus{ outline:none; border-color:var(--vk-mint); }
.en-budgetSum{ font-size:12.5px; color:var(--vk-muted-strong); margin-top:10px; }
.en-budgetSum strong{ color:var(--vk-mint); }

/* meds dose timeline */
.en-phase{ display:inline-block; font-family:var(--en-mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; padding:3px 9px; border-radius:var(--vk-radius-pill); margin:8px 0; }
.en-phase.up{ color:#04130c; background:#a7f3d0; }
.en-phase.peak{ color:#04130c; background:var(--vk-mint); }
.en-phase.fade{ color:#1a1206; background:var(--vk-amber); }
.en-phase.off{ color:var(--vk-muted); border:1px solid var(--vk-border); }
.en-tl{ position:relative; height:24px; margin-top:6px; }
.en-tlBar{ position:absolute; top:10px; left:0; right:0; height:4px; border-radius:99px; background:rgba(255,255,255,.07); overflow:hidden; }
.en-tlFill{ position:absolute; top:0; left:0; bottom:0; border-radius:99px; background:linear-gradient(90deg,var(--vk-mint),var(--vk-amber)); }
.en-tlMark{ position:absolute; top:4px; width:2px; height:16px; background:var(--vk-fg); opacity:.45; }
.en-tlNow{ position:absolute; top:1px; width:11px; height:11px; border-radius:50%; background:var(--vk-amber); box-shadow:0 0 9px var(--vk-amber); transform:translateX(-50%); }
.en-tlLabels{ display:flex; justify-content:space-between; font-family:var(--en-mono); font-size:9px; color:var(--vk-muted); margin-top:6px; }
.en-dose{ border:1px solid var(--vk-border); border-radius:12px; background:var(--vk-card-elevated); padding:14px 15px; margin-bottom:9px; }
.en-doseTop{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
.en-doseName{ font-family:var(--vk-font-serif),serif; font-style:italic; font-size:18px; }
.en-doseName small{ font-family:var(--en-mono); font-style:normal; font-size:11px; color:var(--vk-muted); margin-left:6px; }
.en-doseInfo{ font-family:var(--en-mono); font-size:11px; color:var(--vk-muted-strong); margin-top:8px; line-height:1.6; }
.en-doseInfo b{ color:var(--vk-fg); }
.en-results{ display:flex; flex-direction:column; gap:6px; }
.en-results:not(:empty){ margin-bottom:12px; }
.en-timeRow{ display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
.en-timeRow .lab{ font-family:var(--en-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--vk-muted); }

.en-foot{ text-align:center; font-family:var(--en-mono); font-size:10px; color:var(--vk-muted); margin-top:8px; opacity:.7; line-height:1.6; }

.en-toast{ position:fixed; left:50%; bottom:28px; transform:translate(-50%,18px); background:var(--vk-bg-elevated); border:1px solid var(--vk-border-strong); color:var(--vk-mint); font-family:var(--en-mono); font-size:12.5px; letter-spacing:.03em; padding:12px 18px; border-radius:12px; opacity:0; pointer-events:none; transition:.28s var(--vk-ease-premium); box-shadow:0 12px 40px rgba(110,231,183,.16); max-width:90vw; z-index:50; }
.en-toast.show{ opacity:1; transform:translate(-50%,0); }

@media (max-width:560px){
  .en-heroNum{ font-size:38px; }
  .en-card{ padding:16px; }
}
@media (prefers-reduced-motion:reduce){
  .en-card,.en-tabs{ animation:none !important; opacity:1 !important; transform:none !important; }
  .en-barFill,.en-tlFill{ transition:none; }
}
</style>

<script>
/* =====================================================================
 * ENHANCERS — Supplements + Stimulants + Meds unified into one page,
 * styled with the Rowan4 kit. Each tab reads/writes the SAME localStorage
 * keys as the original standalone pages, so data carries over both ways:
 *   supplements_standalone_v1 · stimulant_standalone_v1 · peak_meds_v1
 * The tabs also cross-feed: today's caffeine + logged meds become live
 * signals for the supplement recommender.
 * ===================================================================== */
(function(){
'use strict';

/* ---------- shared helpers ---------- */
function readLS(k){ try{ const r=localStorage.getItem(k); return r?JSON.parse(r):null; }catch(e){ return null; } }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function clamp(x,a,b){ return Math.max(a,Math.min(b,x)); }
function fmtClock(ms){ const d=new Date(ms); let h=d.getHours(); const m=d.getMinutes(); const ap=h<12?'am':'pm'; h=h%12===0?12:h%12; return h+':'+String(m).padStart(2,'0')+ap; }
function mins(ms){ const m=Math.round(ms/60000); if(m<60)return m+' min'; const h=Math.floor(m/60),mm=m%60; return h+'h'+(mm?' '+mm+'m':''); }
function localDateKey(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function activeDateKey(){ const d=new Date(); if(d.getHours()<6)d.setDate(d.getDate()-1); return localDateKey(d); }
function profile(){ return readLS('patron_profile_v1'); }
function loadHealth(){ try{ let r=readLS('patron_health_v1'); if(r&&r.connected)return r; r=readLS('patron_whoop_data_v1'); if(r&&r.connected)return Object.assign({source:'whoop'},r); }catch(e){} return null; }
function sleepQuality(d){ if(!d)return''; if(d.sleepPerf!=null)return d.sleepPerf>=85?'good':d.sleepPerf>=70?'fair':'poor'; if(d.sleepHours!=null&&d.sleepTargetHours){ const r=d.sleepHours/d.sleepTargetHours; return r>=0.95?'good':r>=0.85?'fair':'poor'; } return''; }

let toastTimer;
function toast(msg){ const t=document.getElementById('enToast'); if(!t)return; t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }

/* shell state */
let activeTab = 'sup';

function renderPanel(){
  const active = document.activeElement; const aid=active?active.id:null;
  const caret=(active&&typeof active.selectionStart==='number')?active.selectionStart:null;
  panel.innerHTML = MODULES[activeTab].html();
  if(MODULES[activeTab].after) MODULES[activeTab].after();

}

/* =====================================================================
 * MODULE: STIMULANTS  (key: stimulant_standalone_v1)
 * One-compartment caffeine PK — predicts peak / comedown / clearance.
 * ===================================================================== */
const STIM = (function(){
  const LS='stimulant_standalone_v1';
  let state = (function(){ const r=readLS(LS); return { logs:(r&&Array.isArray(r.logs))?r.logs:[], custom:(r&&Array.isArray(r.custom))?r.custom:[] }; })();
  function save(){ try{ localStorage.setItem(LS,JSON.stringify(state)); }catch(e){} if(window.PatronDB&&PatronDB.isCloud())PatronDB.set('stimulant',state); }
  const NOW=()=>Date.now();
  let query='';

  const KA=4.0;
  function halfLifeH(){ let hl=5; const p=profile(); if(p){ if(p.sex==='F')hl*=1.05; if(typeof p.age==='number'){ if(p.age>=60)hl*=1.12; else if(p.age>0&&p.age<18)hl*=1.05; } } return hl; }
  function ke(){ return Math.LN2/halfLifeH(); }
  function tmaxH(){ const ka=KA,k=ke(); return Math.log(ka/k)/(ka-k); }
  function doseAmount(mg,h){ if(h<0)return 0; const ka=KA,k=ke(); if(Math.abs(ka-k)<1e-9)return 0; const a=mg*ka/(ka-k)*(Math.exp(-k*h)-Math.exp(-ka*h)); return Math.max(0,a); }
  function bodyAt(t){ return state.logs.reduce((s,l)=>s+doseAmount(l.mg,(t-l.t)/3600000),0); }
  function dailyLimit(){ const p=profile(); const wt=(p&&p.weightKg)?p.weightKg:75; return Math.max(250,Math.min(400,Math.round(6*wt/10)*10)); }

  const DB=[
    ['Espresso (single)',63,'coffee'],['Double espresso',126,'coffee'],['Brewed coffee (8 oz)',95,'coffee'],
    ['Brewed coffee (12 oz)',140,'coffee'],['Drip coffee (16 oz)',190,'coffee'],['Cold brew (16 oz)',205,'coffee'],
    ['Nitro cold brew (16 oz)',280,'coffee'],['Americano',154,'coffee'],['Latte',126,'coffee'],['Cappuccino',126,'coffee'],
    ['Flat white',130,'coffee'],['Mocha',152,'coffee'],['Instant coffee (8 oz)',62,'coffee'],['Decaf coffee (8 oz)',3,'coffee'],
    ['Black tea',47,'tea'],['Green tea',28,'tea'],['Matcha (1 tsp)',70,'tea'],['White tea',15,'tea'],['Oolong tea',38,'tea'],
    ['Chai latte',50,'tea'],['Bottled iced tea',25,'tea'],['Yerba mate',85,'tea'],
    ['Red Bull (8.4 oz)',80,'energy'],['Red Bull (12 oz)',114,'energy'],['Monster (16 oz)',160,'energy'],
    ['Monster Ultra (16 oz)',140,'energy'],['Bang (16 oz)',300,'energy'],['Celsius (12 oz)',200,'energy'],
    ['Rockstar (16 oz)',160,'energy'],['Reign (16 oz)',300,'energy'],['Prime Energy (12 oz)',200,'energy'],
    ['5-Hour Energy',200,'energy'],['G Fuel (1 scoop)',150,'energy'],
    ['Coca-Cola (12 oz)',34,'soda'],['Diet Coke (12 oz)',46,'soda'],['Pepsi (12 oz)',38,'soda'],
    ['Mountain Dew (12 oz)',54,'soda'],['Dr Pepper (12 oz)',41,'soda'],
    ['Pre-workout (1 scoop)',200,'other'],['Caffeine pill (100 mg)',100,'other'],['Caffeine pill (200 mg)',200,'other'],
    ['Dark chocolate (1 oz)',24,'other'],['Hot chocolate',5,'other'],['Espresso martini',100,'other'],
  ].map(d=>({name:d[0],mg:d[1],cat:d[2]}));

  function logsToday(){ const k=localDateKey(); return state.logs.filter(l=>localDateKey(new Date(l.t))===k); }
  function mgToday(){ return logsToday().reduce((s,l)=>s+l.mg,0); }
  function allDrinks(){ return state.custom.map(c=>({name:c.name,mg:c.mg,cat:'custom'})).concat(DB); }
  function nextBedtime(){ const h=loadHealth(); if(!h||!h.bedtime)return null; const [hh,mm]=String(h.bedtime).split(':').map(Number); if(!isFinite(hh))return null; const d=new Date(); d.setHours(hh,mm||0,0,0); if(d.getTime()<=NOW())d.setDate(d.getDate()+1); return d.getTime(); }
  function timing(){ if(!state.logs.length)return null; const last=state.logs.reduce((a,b)=>a.t>b.t?a:b); const peakMs=last.t+tmaxH()*3600000; const peakTotal=bodyAt(peakMs); let comedown=null,clear=null; for(let m=0;m<=20*60;m+=5){ const t=peakMs+m*60000; const amt=bodyAt(t); if(comedown===null&&amt<=peakTotal*0.5)comedown=t; if(clear===null&&amt<=25){clear=t;break;} } return {last,peakMs,peakTotal,comedown,clear}; }
  function status(){ const now=NOW(),cur=bodyAt(now); const lim=dailyLimit(),today=mgToday(); if(today>lim)return{word:'Over limit',tone:'danger'}; if(cur<10)return{word:'Clear',tone:'muted'}; const soon=bodyAt(now+10*60000); if(soon>cur+1){ const t=timing(); if(t&&now<t.peakMs-3*60000)return{word:'Kicking in',tone:''}; return{word:'Peaking',tone:''}; } if(cur>180)return{word:'Wired',tone:'warn'}; if(cur>60)return{word:'Dialed in',tone:''}; return{word:'Comedown',tone:'warn'}; }

  function logDrink(name,mg){ mg=Math.round(Number(mg)); if(!isFinite(mg)||mg<0)return; state.logs.push({id:'c_'+NOW().toString(36)+Math.random().toString(36).slice(2,5),name:String(name),mg,t:NOW()}); save(); renderPanel(); const t=timing(); if(t){ let msg='Logged · peak '+fmtClock(t.peakMs); if(t.comedown)msg+=' · dip '+fmtClock(t.comedown); toast(msg); } }
  function removeLog(id){ state.logs=state.logs.filter(l=>l.id!==id); save(); renderPanel(); }
  function addCustom(name,mg){ name=(name||'').trim(); mg=Math.round(Number(mg)); if(!name){toast('Name your drink first');return;} if(!isFinite(mg)||mg<0){toast('Enter the caffeine in mg');return;} if(!state.custom.some(c=>c.name.toLowerCase()===name.toLowerCase()))state.custom.unshift({name,mg}); save(); logDrink(name,mg); }

  function curveSvg(){
    const now=NOW(); const start=now-3600000; const end=now+11*3600000; const W=320,H=110,padY=8;
    const pts=[]; let max=1;
    for(let t=start;t<=end;t+=15*60000){ const a=bodyAt(t); if(a>max)max=a; pts.push([t,a]); }
    const xOf=t=>((t-start)/(end-start))*W, yOf=a=>H-padY-(a/max)*(H-padY*2);
    const line=pts.map((p,i)=>(i?'L':'M')+xOf(p[0]).toFixed(1)+' '+yOf(p[1]).toFixed(1)).join(' ');
    const area=line+' L '+W+' '+(H-padY)+' L 0 '+(H-padY)+' Z';
    const nowX=xOf(now).toFixed(1); const t=timing(); let marks='';
    if(t){ const px=xOf(t.peakMs); if(px>=0&&px<=W)marks+='<line x1="'+px.toFixed(1)+'" y1="0" x2="'+px.toFixed(1)+'" y2="'+H+'" stroke="#6EE7B7" stroke-width="1" stroke-dasharray="2 3" opacity=".6"/>';
      if(t.comedown){ const cx=xOf(t.comedown); if(cx>=0&&cx<=W)marks+='<line x1="'+cx.toFixed(1)+'" y1="0" x2="'+cx.toFixed(1)+'" y2="'+H+'" stroke="#F59E0B" stroke-width="1" stroke-dasharray="2 3" opacity=".5"/>'; } }
    return '<div class="en-chartWrap"><svg class="en-chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" aria-hidden="true">'
      +'<defs><linearGradient id="enCf" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6EE7B7" stop-opacity=".34"/><stop offset="100%" stop-color="#6EE7B7" stop-opacity="0"/></linearGradient></defs>'
      +marks+'<path d="'+area+'" fill="url(#enCf)"/>'
      +'<path d="'+line+'" fill="none" stroke="#6EE7B7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 5px rgba(110,231,183,.7))"/>'
      +'<line x1="'+nowX+'" y1="0" x2="'+nowX+'" y2="'+H+'" stroke="#fff" stroke-width="1" opacity=".5"/>'
      +'</svg><div class="en-axis"><span>now</span><span>+4h</span><span>+8h</span><span>+11h</span></div></div>';
  }
  function chip(name,mg){ return '<button class="en-chip" data-stim="log" data-name="'+esc(name)+'" data-mg="'+mg+'">'+esc(name)+' · '+mg+'</button>'; }

  function html(){
    const now=NOW(), cur=Math.round(bodyAt(now)); const st=status(); const t=timing();
    const lim=dailyLimit(), today=Math.round(mgToday()); const pct=Math.min(100,today/lim*100); const bed=nextBedtime();
    let peakStr='—',comeStr='—',clearStr='—',peakSub='',comeSub='',clearSub='';
    if(t){ peakStr=fmtClock(t.peakMs); peakSub=now<t.peakMs?'in '+mins(t.peakMs-now):'reached';
      comeStr=t.comedown?fmtClock(t.comedown):'—'; comeSub=t.comedown&&now<t.comedown?'in '+mins(t.comedown-now):'';
      clearStr=t.clear?fmtClock(t.clear):'—'; clearSub=t.clear?'~back to baseline':''; }
    let notes='';
    if(today>lim) notes+='<div class="en-note danger">⚠ You\'ve had <b>'+today+' mg</b> today — over your <b>'+lim+' mg</b> ceiling. Expect jitters and poor sleep. Ease off.</div>';
    else if(today>lim*0.8) notes+='<div class="en-note warn">You\'re at <b>'+today+' mg</b> of your <b>'+lim+' mg</b> daily limit — one more strong drink pushes you over.</div>';
    if(bed){ const atBed=Math.round(bodyAt(bed)); if(atBed>=50)notes+='<div class="en-note warn">≈<b>'+atBed+' mg</b> still in your system at bedtime ('+fmtClock(bed)+'). Consider switching to decaf now.</div>'; }
    if(!state.logs.length) notes='<div class="en-note">Log your first drink and I\'ll predict exactly when you\'ll <b>peak</b> and <b>crash</b> — personalised to your weight, age and sex.</div>';
    const q=query.trim().toLowerCase();
    const results=(q?allDrinks().filter(d=>d.name.toLowerCase().includes(q)):allDrinks()).slice(0,40);
    const tl=logsToday().slice().sort((a,b)=>b.t-a.t);
    return ''
      +'<section class="en-card"><div class="en-hero"><div class="en-heroNum">'+cur+'<small>mg in system</small></div>'
      +'<span class="en-chipStat"'+(st.tone?' data-tone="'+st.tone+'"':'')+'><span class="dot"></span>'+st.word+'</span></div>'
      +'<div class="en-insights">'
      +'<div class="en-insight"><div class="en-insLabel en-mint">⚡ Peak</div><div class="en-insVal en-mint">'+peakStr+'</div><div class="en-insSub">'+peakSub+'</div></div>'
      +'<div class="en-insight"><div class="en-insLabel en-amber">📉 Comedown</div><div class="en-insVal en-amber">'+comeStr+'</div><div class="en-insSub">'+comeSub+'</div></div>'
      +'<div class="en-insight"><div class="en-insLabel">🌙 Cleared</div><div class="en-insVal">'+clearStr+'</div><div class="en-insSub">'+clearSub+'</div></div>'
      +'</div>'+curveSvg()+notes+'</section>'
      +'<section class="en-card"><div class="en-barHead"><span class="en-eyebrow" style="margin:0">Today</span>'
      +'<span><span class="en-barNum"'+(today>lim?' style="color:var(--vk-red)"':'')+'>'+today+'</span><span class="en-barTarget"> / '+lim+' mg</span></span></div>'
      +'<div class="en-bar"><div class="en-barFill'+(today>lim?' over':'')+'" style="width:'+pct+'%"></div></div></section>'
      +'<section class="en-card"><p class="en-eyebrow">Log a drink</p>'
      +'<div class="en-chips">'+chip('Coffee',95)+chip('Espresso',63)+chip('Energy drink',160)+chip('Tea',47)+chip('Pre-workout',200)+'</div>'
      +'<div class="en-search">'+searchIcon+'<input class="en-input pad" id="stimSearch" placeholder="Search 40+ caffeinated drinks…" value="'+esc(query)+'" autocomplete="off"></div>'
      +'<ul class="en-list">'+(results.length?results.map(d=>'<li class="en-itemRow" data-stim="log" data-name="'+esc(d.name)+'" data-mg="'+d.mg+'"><div class="en-itemMain"><div class="en-itemName">'+esc(d.name)+'</div><div class="en-itemMeta">'+esc(d.cat)+'</div></div><div class="en-itemVal">'+d.mg+'<small> mg</small></div></li>').join(''):'<li class="en-muted">No match — add it as a custom drink below.</li>')+'</ul></section>'
      +'<section class="en-card"><p class="en-eyebrow">Add a custom drink</p>'
      +'<form class="en-row2" data-stim="addForm"><input class="en-input" id="stimCName" placeholder="Drink name" autocomplete="off"><input class="en-input mg" id="stimCMg" type="number" inputmode="numeric" min="0" max="1000" placeholder="mg"><button type="submit" class="en-btn">Add</button></form>'
      +'<p class="en-muted" style="margin-top:8px">Not on the list? Enter its caffeine in mg — saved for next time and logged now.</p></section>'
      +(tl.length?'<section class="en-card"><p class="en-eyebrow">Today\'s intake</p><ul class="en-list">'+tl.map(l=>'<li class="en-itemRow" style="cursor:default"><span class="en-itemVal" style="color:var(--vk-mint)">'+fmtClock(l.t)+'</span><span class="en-itemName" style="flex:1">'+esc(l.name)+'</span><span class="en-itemVal">'+l.mg+' mg</span><button class="en-del" data-stim="del" data-id="'+l.id+'" aria-label="Remove">×</button></li>').join('')+'</ul></section>':'');
  }
  function after(){ const si=document.getElementById('stimSearch'); if(si&&query){ si.focus(); si.setSelectionRange(query.length,query.length); } }

  // events
  document.addEventListener('click',e=>{ if(activeTab!=='stim')return; const b=e.target.closest('[data-stim]'); if(!b)return; const a=b.dataset.stim; if(a==='log')logDrink(b.dataset.name,b.dataset.mg); else if(a==='del')removeLog(b.dataset.id); });
  document.addEventListener('submit',e=>{ if(activeTab!=='stim')return; const f=e.target.closest('[data-stim="addForm"]'); if(!f)return; e.preventDefault(); addCustom(document.getElementById('stimCName').value,document.getElementById('stimCMg').value); });
  document.addEventListener('input',e=>{ if(activeTab!=='stim')return; if(e.target.id==='stimSearch'){ query=e.target.value; renderPanel(); } });

  function hydrate(){ if(!window.PatronDB||!PatronDB.isCloud())return; PatronDB.get('stimulant').then(cs=>{ if(cs&&Array.isArray(cs.logs)){ state={logs:cs.logs,custom:Array.isArray(cs.custom)?cs.custom:[]}; try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){} if(activeTab==='stim')renderPanel(); } else { PatronDB.set('stimulant',state); } }).catch(()=>{}); }
  function hasLogs(){ return state.logs.length>0; }
  function mgTodayPub(){ return mgToday(); }
  return { html, after, hydrate, hasLogs, mgTodayPub };
})();

 * MODULE: MEDS  (key: peak_meds_v1)
 * Population PK for rx stimulants / nicotine / nootropics: onset → peak →
 * comedown → wear-off. Shared with the Peak tracker.
 * ===================================================================== */
const MED = (function(){
  const SUB_DB=[

    {name:'Focalin XR',mg:20,ref:20,onset:0.7,tPeak:5,dur:10,lift:28,cat:'rx'},

    {name:'Armodafinil',mg:150,ref:150,onset:1.2,tPeak:4,dur:14,lift:24,cat:'rx'},
    {name:'Strattera',mg:40,ref:40,onset:1,tPeak:3,dur:10,lift:9,cat:'rx'},

    {name:'Zyn (6mg)',mg:6,ref:6,onset:0.1,tPeak:0.4,dur:1.4,lift:13,cat:'nic'},
    {name:'Velo (4mg)',mg:4,ref:4,onset:0.1,tPeak:0.4,dur:1.3,lift:11,cat:'nic'},
    {name:'Nicotine pouch',mg:4,ref:4,onset:0.1,tPeak:0.45,dur:1.3,lift:11,cat:'nic'},
    {name:'Vape',mg:1,ref:1,onset:0.05,tPeak:0.15,dur:0.8,lift:8,cat:'nic'},
    {name:'Cigarette',mg:1,ref:1,onset:0.05,tPeak:0.15,dur:0.9,lift:8,cat:'nic'},
    {name:'L-Tyrosine',mg:500,ref:500,onset:0.5,tPeak:1.5,dur:4,lift:8,cat:'noot'},
    {name:'L-Theanine',mg:200,ref:200,onset:0.4,tPeak:1,dur:4,lift:5,cat:'noot'},
    {name:'Rhodiola',mg:200,ref:200,onset:0.5,tPeak:1.5,dur:5,lift:7,cat:'noot'},
  ];
  const LS='peak_meds_v1';
  function store(){ const r=readLS(LS); return {logs:(r&&Array.isArray(r.logs))?r.logs:[], custom:(r&&Array.isArray(r.custom))?r.custom:[]}; }
  let state=store();
  function save(){ try{ localStorage.setItem(LS,JSON.stringify(state)); }catch(e){} if(window.PatronDB&&PatronDB.isCloud())PatronDB.set('peakmeds',state); renderPanel(); }
  let query=''; let logTime=null;

  function customs(){ return state.custom; }
  function allSubs(){ return customs().concat(SUB_DB); }
  function subNorm(tau,tPeak,dur){ if(tau<0)return 0; tPeak=tPeak||1; dur=dur||4; if(tau<=tPeak)return 0.5-0.5*Math.cos(Math.PI*tau/tPeak); const decay=Math.max(0.3,(dur-tPeak)/2.2); return Math.exp(-(tau-tPeak)/decay); }
  function effectOf(l,nowMs){ const tau=(nowMs-l.t)/3600000; const dose=Math.min(2.2,(l.mg||l.ref||1)/(l.ref||l.mg||1)); return (l.lift||15)*dose*subNorm(tau,l.tPeak,l.dur); }
  function boardNow(){ const n=Date.now(); return state.logs.reduce((s,l)=>s+effectOf(l,n),0); }
  function phaseOf(l){ const tau=(Date.now()-l.t)/3600000; const onset=l.onset||Math.max(0.15,(l.tPeak||1)*0.3); const tPeak=l.tPeak||1,dur=l.dur||4;
    if(tau<onset)return{k:'up',t:'Kicking in'}; if(tau<tPeak-0.4)return{k:'up',t:'Ramping up'}; if(tau<tPeak+0.5)return{k:'peak',t:'At peak'}; if(tau<dur)return{k:'fade',t:'Fading / comedown'}; return{k:'off',t:'Worn off'}; }

  function logSub(sub,mgOverride){ const t=logTime!=null?logTime:Date.now(); const mg=(mgOverride!=null?mgOverride:sub.mg); state.logs.push({id:'m_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),name:sub.name,mg:mg,t:t,onset:sub.onset,tPeak:sub.tPeak,dur:sub.dur,lift:sub.lift,ref:sub.ref||sub.mg,cat:sub.cat||'rx'}); query=''; logTime=null; save(); }
  function lastMg(name){ const ls=state.logs.filter(l=>l.name===name); return ls.length?ls[ls.length-1].mg:null; }
  function logByName(name){ let sub=allSubs().find(s=>s.name===name); if(!sub){ const ls=state.logs.filter(l=>l.name===name); sub=ls[ls.length-1]; } if(!sub)return; const def=lastMg(name)||sub.mg; const v=prompt('Your dose for '+name+' (mg):',def); if(v==null)return; const mg=Math.max(0,Math.round(+v)); if(!mg)return; logSub(sub,mg); }

  function addCustom(name,mg){ name=String(name).trim()||'Custom'; mg=Math.max(0,Math.round(+mg||0)); const sub={name:name,mg:mg,onset:0.5,tPeak:2,dur:5,lift:Math.min(30,12+mg*0.05),ref:mg||1,cat:'custom'}; if(!state.custom.some(c=>String(c.name).toLowerCase()===name.toLowerCase()))state.custom.push(sub); logSub(sub); }
  function mostUsed(n){ const f={},last={}; state.logs.forEach(l=>{ f[l.name]=(f[l.name]||0)+1; last[l.name]=l; }); return Object.keys(f).sort((a,b)=>f[b]-f[a]).slice(0,n).map(nm=>last[nm]); }
  function quickList(){ const out=[],seen={}; const add=d=>{ const k=String(d.name).toLowerCase(); if(!seen[k]){seen[k]=1;out.push(d);} }; customs().forEach(add); mostUsed(5).forEach(add); if(out.length<6)SUB_DB.slice(0,6).forEach(add); return out.slice(0,8); }

  const SIGNAL_LABELS = { 'high-caffeine':'high caffeine','very-high-caffeine':'very high caffeine','has-stims':'on stimulants','has-nicotine':'nicotine','has-alcohol':'alcohol','beginner-training':'new to training','heavy-training':'heavy training','bulk-goal':'goal: bulk','cut-goal':'goal: cut','recomp-goal':'goal: recomp','general-health-goal':'general health','male':'male','female':'female','aging':'age 40+','senior':'age 50+','poor-sleep':'poor sleep','low-recovery':'low recovery' };

  function extractSignals(u){ const sig=[];
    if(u.caffeineMgPerDay>400)sig.push('very-high-caffeine'); else if(u.caffeineMgPerDay>200)sig.push('high-caffeine');
    if(u.hasStims)sig.push('has-stims'); if(u.hasNicotine)sig.push('has-nicotine'); if(u.hasAlcohol)sig.push('has-alcohol');
    if(u.gymLevel==='beginner')sig.push('beginner-training'); else if(u.gymLevel==='intermediate'||u.gymLevel==='advanced')sig.push('heavy-training');
    if(u.goal==='bulk')sig.push('bulk-goal'); else if(u.goal==='cut')sig.push('cut-goal'); else if(u.goal==='recomp')sig.push('recomp-goal'); else if(u.goal==='general_health')sig.push('general-health-goal');
    if(u.sex==='M')sig.push('male'); else if(u.sex==='F')sig.push('female');
    if(u.age!=null){ if(u.age>=50)sig.push('senior'); else if(u.age>=40)sig.push('aging'); }
    if(u.recovery!=null&&u.recovery<50)sig.push('low-recovery'); if(u.sleep==='poor')sig.push('poor-sleep');
    return sig; }
  function scoreSupplement(s,sigs){ let sc=s.baseScore; for(const g of sigs){ const b=s.signalBoosts[g]; if(typeof b==='number')sc+=b; } return Math.max(1,Math.min(10,sc)); }
  function reasonsFor(s,sigs){ return sigs.filter(g=>(s.signalBoosts[g]||0)>0); }
  function recommend(user,opts){ opts=opts||{}; const limit=opts.limit||8,minScore=opts.minScore||5; const sigs=extractSignals(user);
    const scored=SUPPLEMENT_DB.filter(s=>!user.alreadyTakingIds.has(s.id)).map(s=>({supplement:s,score:scoreSupplement(s,sigs),reasons:reasonsFor(s,sigs)})).filter(r=>r.score>=minScore)
      .sort((a,b)=>{ if(b.score!==a.score)return b.score-a.score; if(b.supplement.baseScore!==a.supplement.baseScore)return b.supplement.baseScore-a.supplement.baseScore; return a.supplement.id.localeCompare(b.supplement.id); }).slice(0,limit);
    return { signals:sigs, recommendations:scored }; }
  function packToBudget(recs,budget){ let running=0; const inBudget=[]; const all=recs.map(rec=>{ const next=running+rec.supplement.priceUsdMonthly; const fits=next<=budget; if(fits){ running=next; inBudget.push(rec); } return {rec,fits}; }); return {all,inBudget}; }
  function buyUrlFor(s){ const primary=(s.brand||'').split(/\s+or\s+/i)[0].trim(); return 'https://www.amazon.com/s?k='+encodeURIComponent((primary+' '+s.name).trim()); }

  const LS_KEY='supplements_standalone_v1';
  const DEFAULT_STATE={ version:1, items:[], taken:{}, low:[] };
  function loadState(){ try{ const p=readLS(LS_KEY); if(!p)return JSON.parse(JSON.stringify(DEFAULT_STATE)); return { version:1, items:Array.isArray(p.items)?p.items:[], taken:(p.taken&&typeof p.taken==='object')?p.taken:{}, low:Array.isArray(p.low)?p.low:[] }; }catch(e){ return JSON.parse(JSON.stringify(DEFAULT_STATE)); } }
  let state=loadState();
  function saveState(){ try{ localStorage.setItem(LS_KEY,JSON.stringify(state)); }catch(e){} }
  let budget=75;

  function search(raw){ const q=(raw||'').toLowerCase().trim(); if(!q)return[]; const starts=[],contains=[]; for(const s of SUPPLEMENT_DB){ const hay=[s.name.toLowerCase()].concat(s.aliases.map(a=>a.toLowerCase())); if(hay.some(h=>h.startsWith(q)))starts.push(s); else if(hay.some(h=>h.includes(q)))contains.push(s); } return starts.concat(contains).slice(0,6); }
  function lookupDb(id){ return id?SUPPLEMENT_DB.find(s=>s.id===id)||null:null; }
  function windowMeta(k){ return WINDOWS.find(w=>w.key===k); }
  function windowLabel(k){ const w=windowMeta(k); return w?(w.icon+' '+w.title.toLowerCase()):k; }

  function dateKey(){ return activeDateKey(); }
  function todayTaken(){ return state.taken[dateKey()]||{}; }
  function takenCount(){ const tt=todayTaken(); return state.items.filter(i=>!!tt[i.id]).length; }

  function addItem(input){ const id='s_'+Date.now()+'_'+Math.random().toString(36).slice(2,6); const name=(input.name||'').trim(); if(!name)return; state.items.push({ id, name, icon:input.icon||'💊', dose:(input.dose||'').trim(), window:input.window, note:(input.note||'').trim(), sourceId:input.sourceId!=null?input.sourceId:null }); saveState(); renderPanel(); }
  function removeItem(id){ state.items=state.items.filter(i=>i.id!==id); state.low=state.low.filter(x=>x!==id); for(const k of Object.keys(state.taken)){ if(state.taken[k][id])delete state.taken[k][id]; } saveState(); renderPanel(); }
  function toggleTaken(id){ const key=dateKey(); const day=Object.assign({},state.taken[key]||{}); if(day[id])delete day[id]; else day[id]=Date.now(); state.taken[key]=day; saveState(); renderPanel(); }
  function addFromDb(id){ const s=lookupDb(id); if(!s)return; if(state.items.some(i=>i.sourceId===id)){ toast(s.name+' is already in your stack'); return; } addItem({ name:s.name, icon:s.icon, dose:s.dose, window:s.window, note:s.note, sourceId:s.id }); toast('Added '+s.name); }

  /* live user model — pulls cross-tab signals from Stimulants + Meds */
  function buildUser(){ const sp=readLS('supplements_standalone_profile_v1')||{}; const p=profile()||{}; const h=loadHealth(); const cats=MED.todayCats();
    const age=(sp.age!=null&&sp.age!=='')?Number(sp.age):(p.age!=null?Number(p.age):null);
    return { caffeineMgPerDay:Math.round(STIM.mgTodayPub()), hasStims:cats.hasStims, hasNicotine:cats.hasNicotine, hasAlcohol:false,
      gymLevel:sp.gymLevel||p.gymLevel||'', goal:sp.goal||p.goal||'', sex:sp.sex||p.sex||'', age:isFinite(age)?age:null,
      recovery:(h&&h.recovery!=null)?h.recovery:null, sleep:h?sleepQuality(h):'',
      alreadyTakingIds:new Set(state.items.map(i=>i.sourceId).filter(Boolean)) }; }

  let query='', searchOpen=false;

  function searchDropdown(){ if(!searchOpen)return ''; const matches=search(query); if(!query.trim())return ''; if(!matches.length)return '<div class="en-results" style="margin-top:8px"><div class="en-muted">No match — type a name + dose and hit Add to log it anyway.</div></div>'; return '<div class="en-results" style="margin-top:8px">'+matches.map(s=>'<div class="en-itemRow" data-sup="pick" data-id="'+esc(s.id)+'"><div class="en-itemMain"><div class="en-itemName">'+esc(s.icon)+' '+esc(s.name)+'</div><div class="en-itemMeta">'+esc(s.dose)+' · '+windowLabel(s.window)+'</div></div><span class="en-itemVal">+ add</span></div>').join('')+'</div>'; }

  function html(){
    const tt=todayTaken(); const taken=takenCount(), total=state.items.length;
    const user=buildUser(); const res=recommend(user,{limit:8}); const recs=res.recommendations; const sigs=res.signals;
    const sigChips=sigs.length?'<div class="en-recWhy" style="margin-top:14px">'+sigs.map(s=>'<span class="en-tag">'+esc(SIGNAL_LABELS[s]||s)+'</span>').join('')+'</div>':'';

    // stack grouped by window
    let stackBody;
    if(!total){ stackBody='<div class="en-muted">Your stack is empty. Search below to add what you take — then tick each off as you take it through the day.</div>'; }
    else { let out=''; for(const w of WINDOWS){ const items=state.items.filter(i=>i.window===w.key); if(!items.length)continue;
        out+='<div style="margin-bottom:6px"><div class="en-itemMeta" style="margin:10px 0 7px">'+w.icon+' '+esc(w.title)+' · '+esc(w.time)+'</div><div class="en-stack">'
          +items.map(i=>{ const on=!!tt[i.id]; return '<div class="en-stackRow'+(on?' taken':'')+'"><button class="en-check" data-sup="toggle" data-id="'+esc(i.id)+'" aria-label="Taken">'+(on?'✓':'')+'</button><div class="en-stackName"><b>'+esc(i.icon)+' '+esc(i.name)+'</b><span>'+esc(i.dose||'—')+'</span></div><button class="en-del" data-sup="remove" data-id="'+esc(i.id)+'" aria-label="Remove">×</button></div>'; }).join('')
          +'</div></div>'; }
      stackBody=out; }

    // recommendations
    let recBody;
    if(!recs.length){ recBody='<p class="en-muted">Nothing strongly indicated yet. Add more stack items and fill in your profile — recommendations tune as signals come in.</p>'; }
    else { const packed=packToBudget(recs,budget); const totalIn=packed.inBudget.reduce((s,r)=>s+r.rec.supplement.priceUsdMonthly,0);
      recBody='<div class="en-budget"><label for="supBudget">Budget / mo</label><input id="supBudget" type="number" inputmode="numeric" min="0" value="'+budget+'"></div>'
        +packed.all.map(({rec,fits})=>{ const s=rec.supplement; const why=rec.reasons.map(r=>'<span class="en-tag">'+esc(SIGNAL_LABELS[r]||r)+'</span>').join('');
          return '<div class="en-rec'+(fits?'':' dim')+'"><div class="en-recTop"><div class="en-recName">'+esc(s.icon)+' '+esc(s.name)+'<small>'+esc(s.dose)+'</small></div><div class="en-recPrice">$'+s.priceUsdMonthly+'/mo</div></div>'
            +'<div class="en-recHelp">'+esc(s.helps)+'</div>'+(why?'<div class="en-recWhy">'+why+'</div>':'')
            +'<div class="en-recActions"><button class="en-recAdd" data-sup="addrec" data-id="'+esc(s.id)+'">Add to stack</button><a class="en-recBuy" href="'+buyUrlFor(s)+'" target="_blank" rel="noopener">find it ↗</a></div></div>'; }).join('')
        +'<div class="en-budgetSum"><strong>$'+totalIn+'</strong>/mo for the top '+packed.inBudget.length+' of '+recs.length+' picks within budget.</div>'; }

    return ''
      +'<section class="en-card"><div class="en-hero"><div class="en-heroNum">'+taken+'<small>/ '+total+' taken today</small></div>'
      +'<span class="en-chipStat'+(total&&taken>=total?'':' ')+'"'+(total&&taken>=total?'':' data-tone="muted"')+'><span class="dot"></span>'+(total&&taken>=total?'stack complete':(total?(total-taken)+' left':'empty stack'))+'</span></div>'
      +sigChips+'</section>'
      +'<section class="en-card"><p class="en-eyebrow">Your stack</p>'+stackBody+'</section>'
      +'<section class="en-card"><p class="en-eyebrow">Add to stack</p>'
      +'<div class="en-search">'+searchIcon+'<input class="en-input pad" id="supSearch" placeholder="Search 35+ supplements…" value="'+esc(query)+'" autocomplete="off"></div>'
      +searchDropdown()+'</section>'
      +'<section class="en-card"><p class="en-eyebrow">Smart recommendations</p>'+recBody+'</section>'
      +'<p class="en-foot">Recommendations are signal-driven from your profile + live caffeine/meds from the other tabs — informational, not medical advice.</p>';
  }
  function after(){ const si=document.getElementById('supSearch'); if(si&&query){ si.focus(); si.setSelectionRange(query.length,query.length); } }

  // events
  document.addEventListener('click',e=>{ if(activeTab!=='sup')return; const b=e.target.closest('[data-sup]'); if(!b)return; const a=b.dataset.sup;
    if(a==='toggle')toggleTaken(b.dataset.id);
    else if(a==='remove')removeItem(b.dataset.id);
    else if(a==='addrec')addFromDb(b.dataset.id);
    else if(a==='pick'){ const s=lookupDb(b.dataset.id); if(s){ addFromDb(s.id); query=''; searchOpen=false; renderPanel(); } }
  });
  document.addEventListener('input',e=>{ if(activeTab!=='sup')return;
    if(e.target.id==='supSearch'){ query=e.target.value; searchOpen=true; renderPanel(); }
    else if(e.target.id==='supBudget'){ budget=parseInt(e.target.value,10)||0; renderPanel(); }
  });
  document.addEventListener('keydown',e=>{ if(activeTab!=='sup')return; if(e.target&&e.target.id==='supSearch'){ if(e.key==='Enter'){ e.preventDefault(); const m=search(query); if(m.length){ addFromDb(m[0].id); query=''; searchOpen=false; renderPanel(); } } else if(e.key==='Escape'){ searchOpen=false; renderPanel(); } } });

  function reload(){ state=loadState(); }
  return { html, after, reload };
})();

/* =====================================================================
 * SHELL WIRING
 * ===================================================================== */
const MODULES = { sup:SUP, stim:STIM, med:MED };
function setTab(tab){ if(!MODULES[tab])return; activeTab=tab; document.querySelectorAll('.en-tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab)); if(tab==='sup')SUP.reload(); renderPanel(); }
document.getElementById('enTabs').addEventListener('click',e=>{ const b=e.target.closest('[data-tab]'); if(b)setTab(b.dataset.tab); });

/* drifting mint particles (port of Rowan4Backdrop) */
(function(){ const root=document.getElementById('enParticles'); if(!root)return; const N=window.innerWidth<640?14:24; for(let i=0;i<N;i++){ const s=document.createElement('span'); s.style.left=Math.random()*100+'%'; s.style.top=(60+Math.random()*40)+'%'; const size=1.2+Math.random()*1.2; s.style.width=s.style.height=size+'px'; const dur=22+Math.random()*28; s.style.animationDuration=dur+'s'; s.style.animationDelay=(-Math.random()*dur)+'s'; s.style.setProperty('--dx',(Math.random()*30-15)+'px'); s.style.setProperty('--dy',-(60+Math.random()*50)+'vh'); root.appendChild(s); } })();

/* live ticking — keep PK phases / levels current on the active tab */
setInterval(()=>{ if(activeTab==='stim'&&STIM.hasLogs())renderPanel(); else if(activeTab==='med'&&MED.hasLogs())renderPanel(); }, 60000);

/* initial paint + cloud hydrate */
setTab('sup');
STIM.hydrate(); MED.hydrate();
})();
</script>
